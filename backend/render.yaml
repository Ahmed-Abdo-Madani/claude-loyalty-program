services:
  - type: web
    name: madna-loyalty-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    startCommand: npm start

    # Persistent disk for upload storage (prevents file loss on redeploy)
    disk:
      name: madna-uploads-disk
      mountPath: /app/uploads
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: madna-loyalty-db
          property: connectionString
      # Upload storage environment variables
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: UPLOADS_BASE_URL
        value: https://api.madna.me/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Email Configuration (Resend is the required provider, SendGrid is deprecated)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@madna.me
      - key: FRONTEND_URL
        value: https://app.madna.me
    healthCheckPath: /health
    domains:
      - api.madna.me

databases:
  - name: madna-loyalty-db
    databaseName: madna_loyalty_platform
    user: madna_admin
    plan: starter
