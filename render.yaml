services:
  - type: web
    name: madna-loyalty-backend-docker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: frankfurt
    # startCommand removed - Docker runtime uses CMD from Dockerfile

    # Pre-deploy command: Run pending migrations before switching traffic
    # This ensures database schema is updated before new code goes live
    # Runs on a separate instance with access to DATABASE_URL
    preDeployCommand: node scripts/deploy-migrations.js

    # Persistent disk for upload storage (prevents file loss on redeploy)
    disk:
      name: madna-uploads-disk
      mountPath: /app/uploads
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: madna-loyalty-db
          property: connectionString
      # Upload storage environment variables
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: UPLOADS_BASE_URL
        value: https://api.madna.me/uploads
      # Secrets: Using sync: false to manually set values from existing service
      # This prevents generating new secrets that would invalidate existing sessions
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Email Configuration (Resend is the required provider, SendGrid is deprecated)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@madna.me
      - key: FRONTEND_URL
        value: https://app.madna.me
      # Emergency-only overrides. Set to true to bypass startup blocks.
      # MUST be removed once schema is confirmed healthy.
      - key: SKIP_SCHEMA_VALIDATION
        sync: false
      - key: ALLOW_SCHEMA_DRIFT
        sync: false
      # Set to false to allow server startup even if auto-migrations fail
      - key: MIGRATION_STOP_ON_ERROR
        sync: false
    healthCheckPath: /health
    # Domain will be added after service is verified working
    # domains:
    #   - api.madna.me

databases:
  - name: madna-loyalty-db
    databaseName: madna_loyalty_platform
    user: madna_admin
    plan: Basic-256mb
    region: frankfurt
